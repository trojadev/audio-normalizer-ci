name: Build image

on:
  workflow_call:
    inputs:
      push_to_ghcr:
        required: true
        type: boolean
      image_tag:       
        required: true
        type: string
  




jobs:
  build-image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:

      - name: Set up Docker
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "debug": true,
              "features": { 
                "containerd-snapshotter": true
              }
            }
            
      - name: Download code from repo
        uses: actions/checkout@v6
      
      
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      
      - name: Extract Metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha, prefix=
            type=raw, value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

            
            

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ inputs.push_to_ghcr }}
          load: ${{ !inputs.push_to_ghcr }}
          build-args: |
            PYTHON_VER=${{matrix.python-version}}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha, mode=max


      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'


      - run: docker run --rm -u $(id -u):$(id -g) -v $(pwd)/data:/data ghcr.io/${{ github.repository }}:${{steps.meta.outputs.version}}


      - name: Declare commit SHA Short ENV Variable
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"

      - name: Save processed files
        uses: actions/upload-artifact@v6
        with:
          name: processed_audio_${{ steps.meta.outputs.version }}_${{env.sha_short}}

          path: data/processed_files/

