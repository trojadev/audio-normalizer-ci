name: Scheduled Security Scan

on:
  schedule:
    # Run everyday at 6 am
    - cron: '0 6 * * *'
  workflow_dispatch:
  


jobs:
  scan-production-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
    
      - name: Pull production image test
        id: pull_image
        uses: nick-fields/retry@v2
        with:
          max_attempts: 3
          retry_on: error
          timeout_seconds: 10
      # You can specify the shell commands you want to retry here
          command: |
            docker pull ghcr.io/${{ github.repository }}:late2st	

          

        #- name: Pull production image
        #run: |
        #docker pull ghcr.io/${{ github.repository }}:latest


      - name: Scan production image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'sarif'
          output: 'production-scan.sarif'
          ignore-unfixed: false
          severity: 'HIGH'


      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'production-scan.sarif'

      